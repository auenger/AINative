# feature-workflow/config.yaml
project:
  name: NeuroSyntaxIDE
  main_branch: main
  repo_path: .
  tech_stack: react-19-typescript-tailwindcss
  test_framework: vitest

parallelism:
  max_concurrent: 2

git:
  remote: origin
  auto_push: false
  merge_strategy: "--no-ff"
  push_tags: true

branch_prefix: feature
worktree_prefix: NeuroSyntaxIDE
worktree_base: ..

workflow:
  auto_start: false
  auto_start_next: false
  require_checklist: true
  splitting:
    enabled: true
    threshold: 3
  testing:
    vitest_enabled: true
    test_dir: neuro-syntax-ide/src
    coverage_enabled: true
    coverage_target: 80

completion:
  archive:
    create_tag: true
    tag_format: "{id}-{date}"
    tag_date_format: "%Y%m%d"
  cleanup:
    delete_worktree: true
    delete_branch: true
  record:
    update_spec: true
    update_archive_log: true

naming:
  feature_prefix: feat
  branch_prefix: feature
  worktree_prefix: NeuroSyntaxIDE

paths:
  features_dir: features
  archive_dir: features/archive
  worktree_base: ..
  repo_path: .
